<header class="tab-header">
  <div>
    <h2>My Listings</h2>
    <p>Manage properties published from your account.</p>
  </div>

  <a routerLink="/post" class="tab-action">Post listing</a>
</header>

<div *ngIf="isLoading" class="loading-state">Loading...</div>

<div *ngIf="error" class="error-state">{{ error }}</div>

<div class="account-grid" *ngIf="!isLoading">
  <div *ngFor="let listing of userListings" class="listing-wrapper">
    <app-listing-card [listing]="listing"></app-listing-card>
  </div>
</div>

<p class="empty-state" *ngIf="!isLoading && userListings.length === 0">
  {{ lang === 'ru' ? 'У вас пока нет объявлений.' : 'You do not have any listings yet.' }}
</p>
