<header class="tab-header">
  <div>
    <h2>Settings</h2>
    <p>Update your basic profile information.</p>
  </div>
</header>

<form class="settings-form" (ngSubmit)="saveSettings()">
  <label class="settings-field">
    <span>Name</span>
    <input
      type="text"
      name="username"
      [(ngModel)]="form.username"
      placeholder="Your name"
      required
    />
  </label>

  <label class="settings-field">
    <span>Email</span>
    <input
      type="email"
      name="email"
      [(ngModel)]="form.email"
      placeholder="you@example.com"
    />
  </label>

  <label class="settings-field">
    <span>Phone</span>
    <input
      type="text"
      name="phone"
      [(ngModel)]="form.phone"
      placeholder="+7 777 123 45 67"
    />
  </label>

  <label class="settings-field">
    <span>City</span>
    <input
      type="text"
      name="city"
      [(ngModel)]="form.city"
      placeholder="Almaty"
    />
  </label>

  <button class="settings-submit" type="submit" [disabled]="isSaving">
    {{ isSaving ? 'Saving...' : 'Save changes' }}
  </button>

  <p class="settings-success" *ngIf="successMessage">{{ successMessage }}</p>
  <p class="settings-error" *ngIf="errorMessage">{{ errorMessage }}</p>
</form>
