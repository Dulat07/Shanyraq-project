<div class="header">
  <button class="shadow__btn">Shanyraq.kz</button>

  <div class="lang-switch">
    <button 
      [class.active]="lang === 'en'" 
      (click)="setLang('en')"
    >
      EN
    </button>

    <button 
      [class.active]="lang === 'ru'" 
      (click)="setLang('ru')"
    >
      RU
    </button>
  </div>

  <div class="right-controls">
    <button class="btn-secondary nav-action-link" type="button" (click)="scrollToAbout()">
      {{ lang === 'ru' ? 'О нас' : 'About Us' }}
    </button>

    <a routerLink="/post" class="btn-secondary nav-action-link">
      {{ lang === 'ru' ? 'Разместить' : 'To Post' }}
    </a>

    <a *ngIf="!isLoggedIn" routerLink="/login" class="btn-primary nav-action-link">
      {{ lang === 'ru' ? 'Войти' : 'Sign In' }}
    </a>

    <ng-container *ngIf="isLoggedIn">
      <a routerLink="/account" class="profile-link">
        {{ lang === 'ru' ? 'Профиль' : 'Profile' }}
      </a>
      <button (click)="logout()" class="btn-secondary nav-action-link">
        {{ lang === 'ru' ? 'Выйти' : 'Log Out' }}
      </button>
    </ng-container>

    <button class="icon-btn" type="button" (click)="goToHome()" [attr.aria-label]="lang === 'ru' ? 'Главная' : 'Home'">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="currentColor" class="icon">
        <path d="M946.5 505L560.1 118.8l-25.9-25.9a31.5 31.5 0 0 0-44.4 0L77.5 505a63.9 63.9 0 0 0-18.8 46c.4 35.2 29.7 63.3 64.9 63.3h42.5V940h691.8V614.3h43.4c17.1 0 33.2-6.7 45.3-18.8a63.6 63.6 0 0 0 18.7-45.3c0-17-6.7-33.1-18.8-45.2zM568 868H456V664h112v204zm217.9-325.7V868H632V640c0-22.1-17.9-40-40-40H432c-22.1 0-40 17.9-40 40v228H238.1V542.3h-96l370-369.7 23.1 23.1L882 542.3h-96.1z"></path>
      </svg>
    </button>

    <button class="icon-btn" type="button" (click)="onSearchClick()" [attr.aria-label]="lang === 'ru' ? 'Поиск' : 'Search'">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-width="2" fill="none" stroke="currentColor" class="icon">
        <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-linejoin="round" stroke-linecap="round"></path>
      </svg>
    </button>

    <a routerLink="/account" class="icon-btn" [attr.aria-label]="lang === 'ru' ? 'Кабинет' : 'Account'">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="icon">
        <path d="M12 2.5a5.5 5.5 0 0 1 3.096 10.047 9.005 9.005 0 0 1 5.9 8.181.75.75 0 1 1-1.499.044 7.5 7.5 0 0 0-14.993 0 .75.75 0 0 1-1.5-.045 9.005 9.005 0 0 1 5.9-8.18A5.5 5.5 0 0 1 12 2.5ZM8 8a4 4 0 1 0 8 0 4 4 0 0 0-8 0Z"></path>
      </svg>
    </a>

    <button class="icon-btn" type="button" (click)="openMessages()" [attr.aria-label]="lang === 'ru' ? 'Сообщения' : 'Messages'">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-linejoin="round" stroke-linecap="round" stroke-width="2" fill="none" stroke="currentColor" class="icon">
        <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"></path>
        <path d="M8 9h8M8 13h5"></path>
      </svg>
    </button>
  </div>
</div>
