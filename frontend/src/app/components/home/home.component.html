<main class="home-wrapper">
  <app-search 
    [query]="searchQuery" 
    (queryChange)="onSearchQueryChange($any($event))">
  </app-search>

  <app-filters 
    [cities]="cities" 
    [filters]="filters"
    (filtersChange)="onFiltersChange($event)"
    (clear)="clearFilters()">
  </app-filters>

  <section class="results-container" *ngIf="filteredListings.length > 0; else emptyState">
    <div class="results-info">
      <h3>
        {{ lang === 'ru' ? 'Найдено вариантов' : 'Properties found' }}: 
        <span>{{ filteredListings.length }}</span>
      </h3>
    </div>

    <app-listing-list [listings]="filteredListings"></app-listing-list>
  </section>

  <ng-template #emptyState>
    <div class="no-results">
      <p>{{ lang === 'ru' ? 'Ничего не найдено по вашим критериям' : 'No properties match your criteria' }}</p>
      <button (click)="clearFilters()">{{ lang === 'ru' ? 'Сбросить фильтры' : 'Reset filters' }}</button>
    </div>
  </ng-template>
</main>
