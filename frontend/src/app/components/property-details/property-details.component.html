<div class="home-container">
  <div class="glass-panel" style="padding:3rem;max-width:600px;margin:3rem auto;">
    <button (click)="router.navigate(['/home'])" class="btn-secondary" style="margin-bottom:1.5rem;">
      {{ lang === 'ru' ? '← Назад к объявлениям' : '← Back to Listings' }}
    </button>
    
    <h2>{{ lang === 'ru' ? 'Забронировать объект #' : 'Book Property #' }}{{ propertyId }}</h2>
    <p style="color:var(--text-muted);margin-bottom:2rem;">
      {{ lang === 'ru' ? 'Забронируйте объект мгновенно.' : 'Secure your booking instantly.' }}
    </p>
    
    <div>
      <div class="form-group">
        <label>{{ lang === 'ru' ? 'Выберите дату заезда' : 'Select Arrival Date' }}</label>
        <input type="date" [(ngModel)]="bookingDate" class="fancy-input" />
      </div>
      
      <button (click)="onBook()" [disabled]="isSubmitting" class="btn-primary" style="width:100%;margin-top:1rem;">
        {{ isSubmitting
          ? (lang === 'ru' ? 'Обработка бронирования...' : 'Processing Booking...')
          : (lang === 'ru' ? 'Подтвердить бронирование' : 'Confirm Booking') }}
      </button>
    </div>
  </div>
</div>
