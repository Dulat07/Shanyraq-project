<div class="home-container">
  <div class="glass-panel" style="padding:3rem;max-width:600px;margin:3rem auto;">
    <button (click)="router.navigate(['/home'])" class="btn-secondary" style="margin-bottom:1.5rem;">← Back to Listings</button>
    
    <h2>Book Property #{{ propertyId }}</h2>
    <p style="color:var(--text-muted);margin-bottom:2rem;">Secure your booking instantly.</p>
    
    <div>
      <div class="form-group">
        <label>Select Arrival Date</label>
        <input type="date" [(ngModel)]="bookingDate" class="fancy-input" />
      </div>
      
      <button (click)="onBook()" [disabled]="isSubmitting" class="btn-primary" style="width:100%;margin-top:1rem;">
        {{ isSubmitting ? 'Processing Booking...' : 'Confirm Booking' }}
      </button>
    </div>
  </div>
</div>
